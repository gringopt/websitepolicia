<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MDT Polícia</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:15px;
display:flex;
gap:10px;
}

button{
background:#2563eb;
border:none;
color:white;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input,select{
padding:8px;
margin:4px;
border-radius:6px;
border:none;
}

.crime{
background:#334155;
margin:3px;
padding:6px;
border-radius:6px;
cursor:pointer;
}

.crime.selecionado{
background:#dc2626;
}

.resumo{
position:fixed;
bottom:0;
right:0;
background:#020617;
padding:20px;
width:300px;
border-top-left-radius:10px;
}

img.preview{
max-width:200px;
margin-top:10px;
display:block;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
}

.popup-box{
background:#1e293b;
padding:20px;
border-radius:10px;
width:400px;
}

</style>

</head>
<body>

<header>
<button onclick="mostrar('prisao')">Prisões</button>
<button onclick="mostrar('multas')">Multas</button>
</header>

<div class="container">

<!-- PRISÃO -->

<div id="prisao">

<div class="card">

<h3>Cidadão</h3>

<input id="nome" placeholder="Nome">
<input id="idcidadao" placeholder="ID">

<br>

<input type="file" id="fotoCidadao" accept="image/*" onchange="previewCidadao()">
<img id="previewCidadao" class="preview">

</div>

<div class="card">

<h3>Agentes</h3>

<input id="agenteID" placeholder="ID agente">
<button onclick="addAgente()">Adicionar</button>

<div id="listaAgentes"></div>

</div>

<div class="card">

<h3>Atenuantes</h3>

<label><input type="checkbox" id="confesso"> Réu confesso (-10%)</label><br>
<label><input type="checkbox" id="primario"> Réu primário (-10%)</label><br>
<label><input type="checkbox" id="advogado"> Advogado (-20%)</label>

<br>

<input id="idAdvogado" placeholder="ID advogado">

</div>

<div class="card">

<h3>Evidências</h3>

<input type="file" id="evidencias" multiple accept="image/*" onchange="previewEvidencias()">

<div id="previewEvidencias"></div>

</div>

<div class="card">

<h3>Crimes</h3>

<input id="pesquisaCrime" placeholder="Pesquisar crime..." onkeyup="pesquisarCrime()">

<div id="crimes"></div>

</div>

<button onclick="abrirResumo()">Lançar Prisão</button>

</div>

<!-- MULTAS -->

<div id="multas" style="display:none">

<div class="card">

<h3>Registro de Multa</h3>

<input id="nomeMulta" placeholder="Nome">
<input id="idMulta" placeholder="ID">

<br>

<input type="file" id="fotoVeiculo" accept="image/*" onchange="previewVeiculo()">

<img id="previewVeiculo" class="preview">

<br>

<select id="tipoMulta"></select>

<button onclick="addMulta()">Adicionar</button>

<div id="listaMultas"></div>

<p>Total: $<span id="totalMultas">0</span></p>

<button onclick="enviarMulta()">Enviar Multa</button>

</div>

</div>

</div>

<div class="resumo">

<h3>Resumo</h3>

Pena: <span id="penaTotal">0</span><br>
Multa: $<span id="multaTotal">0</span>

</div>

<div class="popup" id="popup">

<div class="popup-box">

<h3>Confirmar Prisão</h3>

<div id="textoResumo"></div>

<br>

<button onclick="enviarPrisao()">ENVIAR</button>
<button onclick="fecharPopup()">CANCELAR</button>

</div>

</div>

<script>

const webhookPrisao="SEU_WEBHOOK_PRISAO"
const webhookMultas="SEU_WEBHOOK_MULTAS"

let artigos = [

/* CRIMES DIVERSOS */

{cat:"Crimes Diversos",nome:"Art.101 - Aliciamento",pena:10,multa:10000},
{cat:"Crimes Diversos",nome:"Art.102 - Agressão a Funcionário Público",pena:20,multa:20000},
{cat:"Crimes Diversos",nome:"Art.103 - Provocação",pena:8,multa:5000},
{cat:"Crimes Diversos",nome:"Art.104 - Desacato",pena:15,multa:12000},
{cat:"Crimes Diversos",nome:"Art.105 - Perturbação da Ordem",pena:10,multa:8000},

/* CRIMES CONTRA A VIDA */

{cat:"Crimes Contra a Vida",nome:"Art.110 - Homicídio Doloso Qualificado",pena:80,multa:100000},
{cat:"Crimes Contra a Vida",nome:"Art.111 - Homicídio Doloso",pena:60,multa:80000},
{cat:"Crimes Contra a Vida",nome:"Art.112 - Tentativa de Homicídio",pena:40,multa:50000},
{cat:"Crimes Contra a Vida",nome:"Art.113 - Homicídio Culposo",pena:25,multa:25000},

/* DIREITOS FUNDAMENTAIS */

{cat:"Crimes Contra Direitos Fundamentais",nome:"Art.120 - Lesão Corporal",pena:20,multa:20000},
{cat:"Crimes Contra Direitos Fundamentais",nome:"Art.121 - Sequestro",pena:50,multa:50000},
{cat:"Crimes Contra Direitos Fundamentais",nome:"Art.122 - Cárcere Privado",pena:35,multa:35000},
{cat:"Crimes Contra Direitos Fundamentais",nome:"Art.123 - Tortura",pena:60,multa:70000},

/* PATRIMÔNIO */

{cat:"Crimes Contra o Patrimônio",nome:"Art.130 - Furto",pena:15,multa:15000},
{cat:"Crimes Contra o Patrimônio",nome:"Art.131 - Furto Qualificado",pena:25,multa:25000},
{cat:"Crimes Contra o Patrimônio",nome:"Art.132 - Roubo",pena:40,multa:40000},
{cat:"Crimes Contra o Patrimônio",nome:"Art.133 - Roubo Qualificado",pena:55,multa:55000},
{cat:"Crimes Contra o Patrimônio",nome:"Art.134 - Roubo de Veículo",pena:45,multa:45000},
{cat:"Crimes Contra o Patrimônio",nome:"Art.135 - Receptação",pena:25,multa:20000},
{cat:"Crimes Contra o Patrimônio",nome:"Art.136 - Desmanche de Veículos",pena:30,multa:30000},

/* EXTORSÃO */

{cat:"Crimes de Extorsão",nome:"Art.140 - Extorsão",pena:45,multa:45000},
{cat:"Crimes de Extorsão",nome:"Art.141 - Extorsão Mediante Sequestro",pena:70,multa:80000},

/* ARMAS */

{cat:"Crimes de Porte e Tráfico",nome:"Art.150 - Porte Ilegal de Arma",pena:15,multa:15000},
{cat:"Crimes de Porte e Tráfico",nome:"Art.151 - Posse de Arma Restrita",pena:30,multa:30000},
{cat:"Crimes de Porte e Tráfico",nome:"Art.152 - Tráfico de Armas",pena:50,multa:60000},

/* DROGAS */

{cat:"Crimes de Drogas",nome:"Art.160 - Posse de Drogas",pena:10,multa:10000},
{cat:"Crimes de Drogas",nome:"Art.161 - Tráfico de Drogas",pena:60,multa:70000},
{cat:"Crimes de Drogas",nome:"Art.162 - Associação para Tráfico",pena:50,multa:60000},

/* ORDEM PÚBLICA */

{cat:"Crimes Contra Ordem Pública",nome:"Art.170 - Ameaça",pena:10,multa:8000},
{cat:"Crimes Contra Ordem Pública",nome:"Art.171 - Desobediência",pena:12,multa:9000},
{cat:"Crimes Contra Ordem Pública",nome:"Art.172 - Resistência à Prisão",pena:20,multa:20000},
{cat:"Crimes Contra Ordem Pública",nome:"Art.173 - Falsidade Ideológica",pena:25,multa:20000},
{cat:"Crimes Contra Ordem Pública",nome:"Art.174 - Associação Criminosa",pena:45,multa:45000},

/* TRÂNSITO */

{cat:"Crimes de Trânsito",nome:"Art.180 - Condução Imprudente",pena:8,multa:8000},
{cat:"Crimes de Trânsito",nome:"Art.181 - Dirigir na Contramão",pena:10,multa:9000},
{cat:"Crimes de Trânsito",nome:"Art.182 - Alta Velocidade",pena:12,multa:12000},
{cat:"Crimes de Trânsito",nome:"Art.183 - Corrida Ilegal",pena:25,multa:25000},
{cat:"Crimes de Trânsito",nome:"Art.184 - Dirigir Sem Carteira",pena:6,multa:6000},
{cat:"Crimes de Trânsito",nome:"Art.185 - Veículo Mal Estacionado",pena:3,multa:2000}

]

let multas = {

"Art.180 - Condução Imprudente":8000,
"Art.181 - Dirigir na Contramão":9000,
"Art.182 - Alta Velocidade":12000,
"Art.183 - Corrida Ilegal":25000,
"Art.184 - Dirigir Sem Carteira":6000,
"Art.185 - Veículo Mal Estacionado":2000,

"Art.103 - Provocação":5000,
"Art.105 - Perturbação da Ordem":8000,
"Art.170 - Ameaça":8000,
"Art.171 - Desobediência":9000

}

let selecionados=[]
let agentes=[]
let multasSelecionadas=[]

function mostrar(p){
prisao.style.display="none"
multas.style.display="none"
document.getElementById(p).style.display="block"
}

function carregarCrimes(){

let div=document.getElementById("crimes")

let categorias=[...new Set(artigos.map(a=>a.cat))]

categorias.forEach(cat=>{

let h=document.createElement("h4")
h.innerText=cat

div.appendChild(h)

artigos.filter(a=>a.cat===cat).forEach(a=>{

let c=document.createElement("div")
c.className="crime"
c.innerText=a.nome

c.onclick=()=>toggleCrime(a,c)

div.appendChild(c)

})

})

}

function toggleCrime(a,el){

let i=selecionados.indexOf(a)

if(i>-1){
selecionados.splice(i,1)
el.classList.remove("selecionado")
}else{
selecionados.push(a)
el.classList.add("selecionado")
}

calcular()

}

function calcular(){

let pena=0
let multa=0

selecionados.forEach(c=>{
pena+=c.pena
multa+=c.multa
})

let desconto=0

if(confesso.checked) desconto+=10
if(primario.checked) desconto+=10
if(advogado.checked) desconto+=20

pena=Math.floor(pena*(1-desconto/100))

penaTotal.innerText=pena
multaTotal.innerText=multa

}

confesso.onchange=calcular
primario.onchange=calcular
advogado.onchange=calcular

function addAgente(){

let id=agenteID.value

if(!id||agentes.includes(id))return

agentes.push(id)

let d=document.createElement("div")
d.innerText="Agente "+id

listaAgentes.appendChild(d)

agenteID.value=""

}

function pesquisarCrime(){

let filtro=pesquisaCrime.value.toLowerCase()

document.querySelectorAll(".crime").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(filtro)?"block":"none"
})

}

function abrirResumo(){

if(nome.value==""||idcidadao.value==""){
alert("Nome e ID obrigatórios")
return
}

if(fotoCidadao.files.length==0){
alert("Foto do cidadão obrigatória")
return
}

if(selecionados.length==0){
alert("Selecione um crime")
return
}

let crimes=selecionados.map(c=>c.nome).join("<br>")

textoResumo.innerHTML=
"<b>Nome:</b>"+nome.value+"<br>"+
"<b>ID:</b>"+idcidadao.value+"<br>"+
"<b>Crimes:</b><br>"+crimes

popup.style.display="flex"

}

function fecharPopup(){
popup.style.display="none"
}

async function enviarPrisao(){

let crimes=selecionados.map(c=>c.nome).join("\n")

let embed={
embeds:[{
title:"🚔 REGISTRO DE PRISÃO",
color:16711680,
fields:[
{name:"Nome",value:nome.value},
{name:"ID",value:idcidadao.value},
{name:"Agentes",value:agentes.join(", ")||"Nenhum"},
{name:"Crimes",value:crimes},
{name:"Pena",value:penaTotal.innerText+" meses"},
{name:"Multa",value:"$"+multaTotal.innerText}
]
}]
}

await fetch(webhookPrisao,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(embed)
})

let foto=fotoCidadao.files[0]

let form=new FormData()
form.append("file",foto)

await fetch(webhookPrisao,{method:"POST",body:form})

for(let file of evidencias.files){

let f=new FormData()
f.append("file",file)

await fetch(webhookPrisao,{method:"POST",body:f})

}

resetPrisao()
fecharPopup()

}

function resetPrisao(){

nome.value=""
idcidadao.value=""
selecionados=[]
agentes=[]
listaAgentes.innerHTML=""
penaTotal.innerText="0"
multaTotal.innerText="0"
previewCidadao.src=""
previewEvidencias.innerHTML=""

}

function addMulta(){

let tipo=tipoMulta.value
let valor=multas[tipo]

multasSelecionadas.push({tipo,valor})

let d=document.createElement("div")
d.innerText=tipo+" - $"+valor

listaMultas.appendChild(d)

let total=0

multasSelecionadas.forEach(m=>total+=m.valor)

totalMultas.innerText=total

}

async function enviarMulta(){

if(nomeMulta.value==""||idMulta.value==""){
alert("Nome e ID obrigatórios")
return
}

if(multasSelecionadas.length==0){
alert("Adicione multa")
return
}

if(fotoVeiculo.files.length==0){
alert("Foto do veículo obrigatória")
return
}

let lista=multasSelecionadas.map(m=>m.tipo).join("\n")

let embed={
embeds:[{
title:"💰 REGISTRO DE MULTA",
color:65280,
fields:[
{name:"Nome",value:nomeMulta.value},
{name:"ID",value:idMulta.value},
{name:"Infrações",value:lista},
{name:"Total",value:"$"+totalMultas.innerText}
]
}]
}

await fetch(webhookMultas,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(embed)
})

let form=new FormData()
form.append("file",fotoVeiculo.files[0])

await fetch(webhookMultas,{method:"POST",body:form})

nomeMulta.value=""
idMulta.value=""
listaMultas.innerHTML=""
totalMultas.innerText="0"
previewVeiculo.src=""
multasSelecionadas=[]

}

function previewCidadao(){

let file=fotoCidadao.files[0]

if(file){
let reader=new FileReader()

reader.onload=e=>{
previewCidadao.src=e.target.result
}

reader.readAsDataURL(file)
}

}

function previewEvidencias(){

previewEvidencias.innerHTML=""

for(let file of evidencias.files){

let reader=new FileReader()

reader.onload=e=>{
let img=document.createElement("img")
img.src=e.target.result
img.style.width="100px"
img.style.margin="5px"

previewEvidencias.appendChild(img)
}

reader.readAsDataURL(file)

}

}

function previewVeiculo(){

let file=fotoVeiculo.files[0]

if(file){

let reader=new FileReader()

reader.onload=e=>{
previewVeiculo.src=e.target.result
}

reader.readAsDataURL(file)

}

}

function carregarMultas(){

for(let m in multas){

let op=document.createElement("option")
op.value=m
op.innerText=m

tipoMulta.appendChild(op)

}

}

carregarCrimes()
carregarMultas()

</script>

</body>
</html>
